## --------------------------- REDIS --------------------------- ##

  chatwoot_redis:
    image: redis:7.4.2
    command: [
        "redis-server",
        "--port",
        "6379",
        # Memoria — dejar 512MB+ de overhead para el proceso
        "--maxmemory",
        "1536mb",
        "--maxmemory-policy",
        "noeviction",
        # Persistencia mínima para Sidekiq (protege jobs encolados)
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--auto-aof-rewrite-percentage",
        "100",
        "--auto-aof-rewrite-min-size",
        "64mb",
        "--save",
        "",
        # Conexiones
        "--tcp-backlog",
        "511",
        "--timeout",
        "300",
        "--tcp-keepalive",
        "60",
        "--maxclients",
        "10000",
        # Diagnósticos (esenciales para troubleshooting)
        "--slowlog-log-slower-than",
        "10000",
        "--slowlog-max-len",
        "128",
        "--latency-monitor-threshold",
        "100",
        # NO usar io-threads con 1 CPU
        # "--io-threads", "4",
        # "--io-threads-do-reads", "yes",
        # Rendimiento
        "--hz",
        "50",
        "--dynamic-hz",
        "yes",
        "--activedefrag",
        "yes",
      ]
    networks:
      - mired ## Nome da rede interna
    volumes:
      - mega_redis_data:/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2560M
        reservations:
          memory: 1024M

## --------------------------- VOLUMES & REDES --------------------------- ##

volumes:
  chatwoot_storage:
    external: true
    name: chatwoot_storage

  mega_redis_data:
    external: true
    name: mega_redis_data

networks:
  mired: ## Nome da rede interna
    external: true
    name: mired ## Nome da rede interna
